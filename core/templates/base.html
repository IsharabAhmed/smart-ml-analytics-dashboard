<!DOCTYPE html>
<html lang="en" class="bg-[#0f111a] text-gray-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Aura ML | Intelligence Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Outfit', sans-serif; 
            background: radial-gradient(circle at top, #1a1b26 0%, #0f111a 100%);
            background-attachment: fixed;
        }
        .glass-panel {
            background: rgba(30, 33, 43, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .text-gradient {
            background: linear-gradient(135deg, #60A5FA 0%, #A78BFA 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .bg-gradient-primary {
            background: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
        }
        .hover-glow:hover {
            box-shadow: 0 0 20px rgba(139, 92, 246, 0.4);
            border-color: rgba(139, 92, 246, 0.5);
        }
        /* Grid background overlay */
        .bg-grid {
            background-size: 40px 40px;
            background-image: linear-gradient(to right, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(to bottom, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: -1;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col selection:bg-purple-500/30 selection:text-white relative">
    <div class="bg-grid"></div>
    <!-- Floating ambient glow -->
    <div class="fixed top-[-10%] left-[-10%] w-96 h-96 bg-blue-500/10 rounded-full blur-[100px] pointer-events-none"></div>
    <div class="fixed bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-500/10 rounded-full blur-[100px] pointer-events-none"></div>

    <nav class="glass-panel sticky top-0 z-50 border-b border-white/5 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-6 lg:px-8 py-4 flex items-center justify-between">
            <a href="{% url 'dashboard_index' %}" class="flex items-center gap-3 group">
                <div class="w-8 h-8 rounded-lg bg-gradient-primary flex items-center justify-center shadow-lg shadow-purple-500/30 group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>
                </div>
                <span class="text-xl font-bold tracking-tight text-white group-hover:text-gray-200 transition">
                    Aura <span class="text-gray-400 font-medium">Analytics</span>
                </span>
            </a>
            <div class="flex items-center space-x-6 text-sm font-medium">
                <a href="{% url 'dashboard_index' %}" class="text-gray-300 hover:text-white transition">Datasets</a>
                <a href="#" class="text-gray-300 hover:text-white transition">Models</a>
                <div class="h-8 w-8 rounded-full border border-white/10 overflow-hidden flex items-center justify-center bg-gray-800">
                    <svg class="w-4 h-4 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" /></svg>
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-grow w-full max-w-7xl mx-auto px-6 lg:px-8 py-10 relative z-10">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
